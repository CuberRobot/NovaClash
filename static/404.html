<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - 页面不存在</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1e2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e9ecf7;
      }
      .container {
        text-align: center;
        padding: 40px;
      }
      .error-code {
        font-size: 120px;
        font-weight: 800;
        color: rgba(233, 236, 247, 0.15);
        line-height: 1;
        margin-bottom: 20px;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .message {
        font-size: 16px;
        color: rgba(233, 236, 247, 0.6);
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="container">
      <div class="error-code">404</div>
      <div class="title">页面不存在</div>
      <div class="message">您访问的页面不存在或已被移除</div>
      <a href="/" class="btn">返回主页</a>
    </div>
  </body>
</html>
